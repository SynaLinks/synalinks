site_name: Synalinks OSS
site_description: Keras based LM framework for neuro-symbolic applications
site_url: https://synalinks.github.io/synalinks
repo_url: https://github.com/SynaLinks/synalinks
repo_name: SynaLinks/synalinks
theme:
  name: material
  logo: assets/synalinks-light.svg
  favicon: assets/synalinks_favicon.png
  features:
    - content.code.copy
  icon:
    repo: fontawesome/brands/github
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/summarize.js

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.snippets:
      base_path:
        - .
      check_paths: true

plugins:
  - search
  - mkdocstrings:
      default_handler: python
  - glightbox

