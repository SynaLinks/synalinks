name: Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.12", "3.13", "3.14"]

    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
      # setup-uv used to create a `.venv` automatically; since uv 0.11.16 it no
      # longer does, so `uv pip install` (in shell/install.sh) has no
      # environment and aborts with "No virtual environment found". Create it
      # explicitly — the `.venv` that install.sh and `uv run` both target.
      - name: Create virtual environment
        run: uv venv
      - name: Display Python version
        run: uv run python -c "import sys; print(sys.version)"
      - name: Install graphviz (macOS)
        if: runner.os == 'macOS'
        run: brew install graphviz
      - name: Install Synalinks
        run: ./shell/install.sh
      - name: Install dev/test dependencies
        run: uv pip install --group dev
      # GitHub's ubuntu-24.04 runners ship
      # kernel.apparmor_restrict_unprivileged_userns=1, which lets unshare()
      # create a user namespace but then neuters it so the /proc/self/setgroups
      # write EPERMs — sandbox confinement can't initialize. Flip it off so the
      # MirageSandbox confinement is genuinely exercised in CI (macOS has no
      # such mechanism; confinement is Linux-only and those tests skip there).
      - name: Enable unprivileged user namespaces (sandbox confinement)
        if: runner.os == 'Linux'
        run: |
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 || true
          sudo sysctl -w kernel.unprivileged_userns_clone=1 || true
      # Fail loudly if confinement is NOT actually available on Linux, rather
      # than letting the confine tests silently skip — CI must keep confinement
      # under test (the whole point of the step above).
      - name: Assert sandbox confinement is available (Linux)
        if: runner.os == 'Linux'
        run: |
          uv run python -c "from synalinks.src.sandboxes.mirage_sandbox import _confinement_available; ok, why = _confinement_available(); print('confinement available:', ok, why); raise SystemExit(0 if ok else 1)"
      - name: Run the tests
        run: uv run pytest --cov-config=pyproject.toml
      - name: Generate coverage badge
        if: runner.os == 'Linux'
        run: uvx --from 'genbadge[coverage]' genbadge coverage -i coverage.xml
