name: Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13"]

    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
      # setup-uv used to create a `.venv` automatically; since uv 0.11.16 it no
      # longer does, so `uv pip install` (in shell/install.sh) has no
      # environment and aborts with "No virtual environment found". Create it
      # explicitly — the `.venv` that install.sh and `uv run` both target.
      - name: Create virtual environment
        run: uv venv
      - name: Display Python version
        run: uv run python -c "import sys; print(sys.version)"
      - name: Install graphviz (macOS)
        if: runner.os == 'macOS'
        run: brew install graphviz
      - name: Install graphviz (Windows)
        if: runner.os == 'Windows'
        run: choco install graphviz --no-progress -y
      - name: Install Synalinks
        run: ./shell/install.sh
      - name: Install pytest
        run: uv pip install pytest pytest-cov
      - name: Run the tests
        run: uv run pytest --cov-config=pyproject.toml
      - name: Generate coverage badge
        if: runner.os == 'Linux'
        run: uvx --from 'genbadge[coverage]' genbadge coverage -i coverage.xml
