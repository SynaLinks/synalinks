name: Docs
on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

# Publish the built `site/` to the gh-pages branch (same target as the old
# `mkdocs gh-deploy`), so GitHub Pages keeps serving from that branch — no
# Pages "Source" setting change required.
permissions:
  contents: write

# Never let two doc deploys race on the gh-pages branch.
concurrency:
  group: docs-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure Git Credentials
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"
          enable-cache: true
      # setup-uv used to create a `.venv` automatically; since uv 0.11.16 it no
      # longer does, so `uv pip install` (in shell/install.sh) has no
      # environment and aborts with "No virtual environment found". Create it
      # explicitly — the `.venv` that install.sh and `uv run` both target.
      - name: Create virtual environment
        run: uv venv
      # mkdocstrings imports the `synalinks` and guide modules to render the
      # `:::` reference pages, so the package + its deps must be installed —
      # the same toolchain shell/doc.sh builds with locally. `ghp-import`
      # publishes the static `site/` to gh-pages (Zensical only builds; this is
      # what `mkdocs gh-deploy` used under the hood).
      - name: Install Synalinks + docs toolchain
        run: |
          ./shell/install.sh
          uv pip install zensical mkdocs mkdocs-material mkdocstrings[python] mkdocs-glightbox ghp-import
      - name: Build the site
        run: uv run zensical build --clean
      # Correct the asset-link depths Zensical miscomputes for docstring-injected
      # images; without this they 404 under the `/synalinks/` Pages sub-path.
      - name: Fix docstring image paths
        run: uv run python shell/fix_doc_image_paths.py site
      # Zensical copies every docs/ file into the site, including the theme
      # custom_dir (docs/.overrides) — drop that template fragment.
      - name: Remove copied theme overrides
        run: rm -rf site/.overrides
      - name: Publish to gh-pages
        run: uv run ghp-import --no-jekyll --push --force --message "Deployed ${{ github.sha }} with Zensical" site
