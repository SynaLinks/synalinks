name: Docs
on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:
permissions:
  contents: write
# Never let two doc deploys race on the gh-pages branch.
concurrency:
  group: docs-deploy
  cancel-in-progress: true
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure Git Credentials
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
      - uses: actions/setup-python@v5
        with:
          python-version: 3.x
      - run: echo "cache_id=$(date --utc '+%V')" >> $GITHUB_ENV
      - uses: actions/cache@v4
        with:
          key: zensical-${{ env.cache_id }}
          path: .cache
          restore-keys: |
            zensical-
      # Same toolchain shell/doc.sh builds with locally, plus ghp-import to
      # publish the static `site/` to the gh-pages branch (Zensical has no
      # `gh-deploy` command — it only builds; `mkdocs gh-deploy` used ghp-import
      # under the hood, so we call it directly).
      - run: pip install zensical mkdocs mkdocs-material mkdocstrings[python] mkdocs-glightbox ghp-import
      - run: zensical build
      - run: ghp-import --no-jekyll --push --force --message "Deployed ${{ github.sha }} with Zensical" site